name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: native
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS auth
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android)
        id: eas_build
        working-directory: native
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"

      - name: 🔴 Fetch failure logs
        if: failure()
        working-directory: native
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "=================================================="
          echo "📋 FETCHING ACTUAL BUILD ERROR FROM EAS API"
          echo "=================================================="

          # Get most recent build ID for this project
          BUILD_INFO=$(eas build:list --limit 1 --json --non-interactive 2>/dev/null)
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id // empty')

          if [ -z "$BUILD_ID" ]; then
            echo "❌ Could not fetch build ID"
            exit 0
          fi

          echo "🔍 Build ID: $BUILD_ID"
          echo ""

          # Get full build details
          BUILD_VIEW=$(eas build:view "$BUILD_ID" --json --non-interactive 2>/dev/null)

          echo "::group::📦 Build status"
          echo "$BUILD_VIEW" | jq '{status, platform, error, completedAt}'
          echo "::endgroup::"

          # Try the logsUrl field
          LOGS_URL=$(echo "$BUILD_VIEW" | jq -r '.artifacts.logsS3KeyPrefix // .artifacts.logsUrl // .logFiles // empty')

          echo "::group::🔗 Available URLs"
          echo "$BUILD_VIEW" | jq '.artifacts // {}'
          echo "::endgroup::"

          # Show error message from the build
          echo "::group::❌ ERROR DETAILS"
          echo "$BUILD_VIEW" | jq -r '.error // "no error field"'
          echo "::endgroup::"

          # If logsUrl available, download and extract
          DOWNLOAD_URL=$(echo "$BUILD_VIEW" | jq -r '.artifacts.logsUrl // empty')
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            echo "📥 Downloading logs from: $DOWNLOAD_URL"
            curl -fsSL "$DOWNLOAD_URL" -o build-logs.tar.gz 2>&1 || echo "Download failed"
            if [ -f build-logs.tar.gz ]; then
              mkdir -p extracted-logs
              tar -xzf build-logs.tar.gz -C extracted-logs 2>&1 || echo "Extract failed"
              echo "::group::📁 Log files"
              find extracted-logs -type f | head -20
              echo "::endgroup::"
              echo "::group::🔥 GRADLE LOG (last 200 lines)"
              find extracted-logs -name "*gradle*" -o -name "*build*log*" | head -3 | while read f; do
                echo "--- $f ---"
                tail -200 "$f"
              done
              echo "::endgroup::"
              echo "::group::🔥 ALL LOGS (last 100 lines each)"
              find extracted-logs -name "*.log" -o -name "*.txt" | while read f; do
                echo "--- $f ---"
                tail -100 "$f"
                echo ""
              done
              echo "::endgroup::"
            fi
          else
            echo "ℹ️  No logsUrl available, dumping raw build object:"
            echo "::group::📄 Full build JSON"
            echo "$BUILD_VIEW" | jq '.'
            echo "::endgroup::"
          fi
