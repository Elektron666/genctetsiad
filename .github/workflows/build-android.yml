name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: native
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS auth
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android)
        id: eas_build
        working-directory: native
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"

      - name: 🔴 Fetch failure logs
        if: failure()
        working-directory: native
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set +e
          echo "=================================================="
          echo "📋 FETCHING ACTUAL BUILD ERROR FROM EAS API"
          echo "=================================================="

          BUILD_INFO=$(eas build:list --limit 1 --json --non-interactive 2>&1)
          echo "BUILD_INFO raw: $BUILD_INFO"
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id // empty' 2>/dev/null)

          if [ -z "$BUILD_ID" ]; then
            echo "❌ Could not parse Build ID from: $BUILD_INFO"
            exit 0
          fi

          echo "🔍 Build ID: $BUILD_ID"

          BUILD_VIEW=$(eas build:view "$BUILD_ID" --json --non-interactive 2>&1)

          echo "::group::📦 Build status"
          echo "$BUILD_VIEW" | jq '{status, platform, error, completedAt}' 2>/dev/null || echo "$BUILD_VIEW"
          echo "::endgroup::"

          echo "::group::❌ ERROR DETAILS"
          echo "$BUILD_VIEW" | jq -r '.error // "no error field"' 2>/dev/null
          echo "::endgroup::"

          # EAS 'logFiles' array'i veya 'artifacts.logsUrl' içinde log URL'leri olabilir
          LOG_URLS=$(echo "$BUILD_VIEW" | jq -r '(.logFiles // []) + ([.artifacts.logsUrl] // []) | .[] | select(. != null and . != "")' 2>/dev/null)

          if [ -z "$LOG_URLS" ]; then
            echo "❌ Hiç log URL bulunamadı"
            echo "::group::📄 Full build JSON"
            echo "$BUILD_VIEW" | jq '.' 2>/dev/null || echo "$BUILD_VIEW"
            echo "::endgroup::"
            exit 0
          fi

          mkdir -p logs
          i=0
          echo "$LOG_URLS" | while read URL; do
            i=$((i+1))
            FILE="logs/log-$i"
            echo "📥 [$i] $URL"
            curl -fsSL "$URL" -o "$FILE.raw" 2>&1 || { echo "  download failed"; continue; }

            # txt mi tar.gz mi tespit et
            if file "$FILE.raw" | grep -q "gzip"; then
              mv "$FILE.raw" "$FILE.tar.gz"
              tar -xzf "$FILE.tar.gz" -C logs 2>&1 || echo "  extract failed"
            else
              mv "$FILE.raw" "$FILE.txt"
            fi
          done

          echo "::group::🔥 BUILD LOG (full content)"
          find logs -type f \( -name "*.txt" -o -name "*.log" \) | while read f; do
            echo ""
            echo "════════════════ $f ════════════════"
            cat "$f"
          done
          echo "::endgroup::"
