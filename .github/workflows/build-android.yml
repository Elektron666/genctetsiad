name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: native
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS auth
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android)
        id: eas_build
        working-directory: native
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"

      - name: 🔴 Fetch failure logs
        if: failure()
        working-directory: native
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set +e
          echo "=================================================="
          echo "📋 FETCHING ACTUAL BUILD ERROR FROM EAS API"
          echo "=================================================="

          BUILD_INFO=$(eas build:list --limit 1 --json --non-interactive 2>&1)
          echo "BUILD_INFO raw: $BUILD_INFO"
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id // empty' 2>/dev/null)

          if [ -z "$BUILD_ID" ]; then
            echo "❌ Could not parse Build ID from: $BUILD_INFO"
            exit 0
          fi

          echo "🔍 Build ID: $BUILD_ID"

          BUILD_VIEW=$(eas build:view "$BUILD_ID" --json --non-interactive 2>&1)

          echo "::group::📦 Build status"
          echo "$BUILD_VIEW" | jq '{status, platform, error, completedAt}' 2>/dev/null || echo "$BUILD_VIEW"
          echo "::endgroup::"

          echo "::group::❌ ERROR DETAILS"
          echo "$BUILD_VIEW" | jq -r '.error // "no error field"' 2>/dev/null
          echo "::endgroup::"

          DOWNLOAD_URL=$(echo "$BUILD_VIEW" | jq -r '.artifacts.logsUrl // empty' 2>/dev/null)
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            echo "📥 Downloading logs from: $DOWNLOAD_URL"
            curl -fsSL "$DOWNLOAD_URL" -o build-logs.tar.gz 2>&1 || echo "Download failed"
            if [ -f build-logs.tar.gz ]; then
              mkdir -p extracted-logs
              tar -xzf build-logs.tar.gz -C extracted-logs 2>&1 || echo "Extract failed"
              echo "::group::🔥 GRADLE LOG (last 300 lines)"
              find extracted-logs -name "*gradle*" -o -name "*build*log*" 2>/dev/null | head -3 | while read f; do
                echo "--- $f ---"
                tail -300 "$f"
              done
              echo "::endgroup::"
              echo "::group::🔥 ALL LOGS (last 150 lines each)"
              find extracted-logs -name "*.log" -o -name "*.txt" 2>/dev/null | while read f; do
                echo "--- $f ---"
                tail -150 "$f"
                echo ""
              done
              echo "::endgroup::"
            fi
          else
            echo "::group::📄 Full build JSON"
            echo "$BUILD_VIEW" | jq '.' 2>/dev/null || echo "$BUILD_VIEW"
            echo "::endgroup::"
          fi
