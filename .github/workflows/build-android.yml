name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: native
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS auth
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android)
        id: eas_build
        working-directory: native
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"

      - name: 🔴 Fetch failure logs
        if: failure()
        working-directory: native
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set +e
          echo "=================================================="
          echo "📋 FETCHING ACTUAL BUILD ERROR FROM EAS API"
          echo "=================================================="

          BUILD_INFO=$(eas build:list --limit 1 --json --non-interactive 2>&1)
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id // empty' 2>/dev/null)
          echo "🔍 Build ID: $BUILD_ID"

          if [ -z "$BUILD_ID" ]; then
            echo "❌ BUILD_INFO: $BUILD_INFO"
            exit 0
          fi

          # logFiles URL'lerini BUILD_INFO'dan hemen al (URL'ler kısa süre geçerli)
          LOG_URL=$(echo "$BUILD_INFO" | jq -r '.[0].logFiles[0] // empty' 2>/dev/null)

          echo "::group::❌ EAS Error"
          echo "$BUILD_INFO" | jq -r '.[0].error' 2>/dev/null
          echo "::endgroup::"

          if [ -n "$LOG_URL" ]; then
            echo "📥 Downloading log: $LOG_URL"
            curl -fsSL "$LOG_URL" -o build.log.txt 2>&1
            if [ -f build.log.txt ] && [ -s build.log.txt ]; then
              echo "✅ Log downloaded: $(wc -c < build.log.txt) bytes"
              echo "::group::🔥 FULL BUILD LOG"
              cat build.log.txt
              echo "::endgroup::"
              echo "::group::🎯 GRADLE ERRORS ONLY"
              grep -E "^(FAILURE|e:|error:|ERROR|> Task|BUILD FAILED|Exception|Caused by)" build.log.txt || echo "(no grep match)"
              echo "::endgroup::"
            else
              echo "❌ Log download failed"
            fi
          else
            echo "❌ No logFiles URL in BUILD_INFO"
            echo "BUILD_INFO: $BUILD_INFO"
          fi
